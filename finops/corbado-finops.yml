meters:
- name: monthly_active_users
  description: Distinct users who authenticate within the billing month, billed per MAU beyond the included allotment.
  unit: monthly_active_users
  aggregation: max
  dimensions:
  - project
  - account
- name: included_mau
  description: Monthly active users included at no charge under the self-serve plan allotment.
  unit: monthly_active_users
  aggregation: max
  dimensions:
  - project
- name: observe_subscription
  description: Corbado Observe enterprise subscription (custom contract).
  unit: contract
  aggregation: sum
  dimensions:
  - account
- name: connect_subscription
  description: Corbado Connect enterprise subscription (custom contract).
  unit: contract
  aggregation: sum
  dimensions:
  - account
principles:
- name: Visibility
  description: Track monthly active users per Corbado project; reconcile MAU counts against invoices.
- name: Allocation
  description: Use separate Corbado projects per product/environment and map each to a cost center.
- name: Optimization
  description: Consolidate low-traffic projects, retire inactive users, and right-size between self-serve usage and enterprise Connect/Observe contracts.
- name: Accountability
  description: Assign an owner per project; review MAU growth monthly against budget and contracted thresholds.
