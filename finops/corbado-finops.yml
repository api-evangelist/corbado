description: >-
  FinOps view of Corbado spend. Corbado bills the passkey platform primarily
  on monthly active users (MAU), with an included allotment on the self-serve
  tier and a per-additional-MAU rate beyond it, plus custom enterprise
  packaging for Corbado Observe (passkey intelligence) and Corbado Connect
  (managed passkeys). The dominant cost driver is the number of distinct users
  who authenticate within a billing month, so optimization focuses on
  understanding active-user counts per project and consolidating projects.
notes: >-
  Per-MAU rates and tier thresholds are not fully public; verify against the
  Corbado pricing page and a sales quote during reconciliation.
